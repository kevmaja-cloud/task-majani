<<script>
// ============================================================================
// TASK MAJANI - Enterprise Task Tracker v3.1
// Refactored & Optimized
// ============================================================================

const CONFIG = {
    APP_NAME: 'Task Majani',
    VERSION: '3.1',
    STORAGE_PREFIX: 'tm_v3_',
    OUTSPOKEN: 'Done'
};

const LEAD_STAGES = ["New Lead","Contacted","Interested","Proposal Sent","Negotiation","Follow-up","Won","Lost","Dormant"];
const ROLES = {
    ADMIN: { label: 'Admin', permissions: ['full'] },
    MANAGER: { label: 'Manager', permissions: ['edit', 'view'] }
};
const DEMO_USERS = {
    admin: { password: 'admin123', role: 'ADMIN', name: 'Admin' },
    manager: { password: 'manager123', role: 'MANAGER', name: 'Manager' }
};

let AppState = {
    tasks: [], leads: [], projects: [], activities: [], goals: [], files: [],
    currentUser: null, charts: {}, initialized: false
};

console.log('[DEBUG] Script loaded, CONFIG:', CONFIG);

// SECURITY: HTML Escape Helper
function escapeHTML(str) {
    if (str === null || str === undefined) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

// Storage Layer
const Storage = {
    save(key, data) {
        try {
            localStorage.setItem(CONFIG.STORAGE_PREFIX + key, JSON.stringify(data));
            return true;
        } catch (e) {
            console.error('[DEBUG] Storage save failed:', e);
            return false;
        }
    },
    load(key, fallback) {
        try {
            const item = localStorage.getItem(CONFIG.STORAGE_PREFIX + key);
            return item ? JSON.parse(item) : (fallback || []);
        } catch (e) {
            console.error('[DEBUG] Storage load failed:', e);
            return fallback || [];
        }
    },
    remove(key) {
        localStorage.removeItem(CONFIG.STORAGE_PREFIX + key);
    }
};

// ID Generator
const IDGenerator = {
    generate(prefix, items) {
        const year = new Date().getFullYear();
        let max = 0;
        items.forEach(function(i) {
            if (i.id && i.id.startsWith(prefix)) {
                const parts = i.id.split('-');
                if (parts.length >= 3) {
                    const num = parseInt(parts[2], 10);
                    if (!isNaN(num) && num > max) max = num;
                }
            }
        });
        return prefix + '-' + year + '-' + String(max + 1).padStart(4, '0');
    },
    generateTask(items) { return this.generate('TASK', items); },
    generateLead(items) { return this.generate('LEAD', items); },
    generateProject(items) { return this.generate('PROJ', items); },
    generateActivity(items) { return this.generate('ACT', items); },
    generateGoal(items) { return this.generate('GOAL', items); }
};

// Toast
function showToast(message, type) {
    type = type || 'info';
    const container = document.getElementById('toastContainer');
    if (!container) { console.error('[DEBUG] toastContainer not found'); return; }
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.innerHTML = '<i class="fas ' + icon + '"></i><span>' + escapeHTML(message) + '</span>';
    container.appendChild(toast);
    setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(function() { toast.remove(); }, 300);
    }, 3000);
}

// Initialization
function init() {
    console.log('[DEBUG] init() called');
    
    AppState.tasks = Storage.load('tasks', []);
    AppState.leads = Storage.load('leads', []);
    AppState.projects = Storage.load('projects', []);
    AppState.activities = Storage.load('activities', []);
    AppState.goals = Storage.load('goals', []);

    console.log('[DEBUG] Loaded state:', { tasks: AppState.tasks.length, leads: AppState.leads.length });

    if (AppState.tasks.length === 0 && AppState.leads.length === 0) {
        console.log('[DEBUG] Seeding demo data');
        seedDemoData();
    }

    applyTheme(Storage.load('settings', { theme: 'light' }).theme);

    const savedUser = Storage.load('currentUser', null);
    console.log('[DEBUG] savedUser:', savedUser);

    if (savedUser) {
        console.log('[DEBUG] Restoring session');
        AppState.currentUser = savedUser;
        renderApp();
    } else {
        console.log('[DEBUG] No session, showing login');
        renderLogin();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
}

function seedDemoData() {
    console.log('[DEBUG] seedDemoData()');
    const demoTasks = [
        { name: "Title Audit", project: "Audit", owner: "Joan", priority: "High", status: "In Progress", percentComplete: 45, dueDate: "2026-06-15", daysOverdue: 2 },
        { name: "Q2 Financial Review", project: "Finance", owner: "Mark", priority: "High", status: "Not Started", percentComplete: 0, dueDate: "2026-06-20", daysOverdue: 0 },
        { name: "Client Onboarding", project: "Sales", owner: "Sarah", priority: "Medium", status: "Done", percentComplete: 100, dueDate: "2026-06-10", daysOverdue: 0 }
    ];

    demoTasks.forEach(function(t) {
        AppState.tasks.push({
            id: IDGenerator.generateTask(AppState.tasks),
            name: t.name, project: t.project, owner: t.owner, priority: t.priority,
            status: t.status, percentComplete: t.percentComplete, dueDate: t.dueDate,
            daysOverdue: t.daysOverdue,
            signal: t.daysOverdue > 0 ? 'OVERDUE' : 'ON TRACK',
            month: 'Jun', year: 2026, createdDate: '2026-06-01',
            activities: [], files: []
        });
    });

    AppState.leads.push({
        id: IDGenerator.generateLead(AppState.leads),
        name: "Demo Lead", contact: "+254700000", company: "Demo Ltd",
        stage: "Interested", value: 250000, lastContactDate: "2026-06-01",
        followUpDate: "2026-06-10", assignedTo: "Admin", source: "Web",
        notes: "", archived: false, converted: false
    });

    AppState.goals.push({
        id: IDGenerator.generateGoal(AppState.goals),
        title: "Read Reports", target: 100, current: 30, unit: "Pages",
        startDate: "2026-06-01", endDate: "2026-06-30",
        description: "Finish Q2 reports", logs: []
    });

    saveAll();
}

function saveAll() {
    Storage.save('tasks', AppState.tasks);
    Storage.save('leads', AppState.leads);
    Storage.save('projects', AppState.projects);
    Storage.save('activities', AppState.activities);
    Storage.save('goals', AppState.goals);
}

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
}

function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    const next = cur === 'light' ? 'dark' : 'light';
    applyTheme(next);
    Storage.save('settings', { theme: next });
}

// AUTHENTICATION
function renderLogin() {
    console.log('[DEBUG] renderLogin()');
    const appRoot = document.getElementById('appRoot');
    if (!appRoot) { console.error('[DEBUG] appRoot not found!'); return; }
    
    appRoot.innerHTML =
        '<div class="login-screen">' +
            '<div class="login-box">' +
                '<div class="login-logo"><i class="fas fa-leaf"></i></div>' +
                '<h2>' + escapeHTML(CONFIG.APP_NAME) + '</h2>' +
                '<p>Enterprise Task Tracker</p>' +
                '<input type="text" id="loginUser" placeholder="Username" value="admin" autocomplete="username">' +
                '<input type="password" id="loginPass" placeholder="Password" value="admin123" autocomplete="current-password">' +
                '<button class="btn btn-primary" style="width:100%;padding:0.875rem;" onclick="handleLogin()">' +
                    '<i class="fas fa-sign-in-alt"></i> Sign In' +
                '</button>' +
                '<div class="login-error" id="loginError"></div>' +
                '<div class="login-hint">' +
                    '<strong>Demo Credentials:</strong><br>' +
                    'Admin: admin / admin123<br>' +
                    'Manager: manager / manager123' +
                '</div>' +
            '</div>' +
        '</div>';
    console.log('[DEBUG] Login HTML rendered');
}

function handleLogin() {
    console.log('[DEBUG] handleLogin() clicked');
    
    const userInput = document.getElementById('loginUser');
    const passInput = document.getElementById('loginPass');
    
    if (!userInput || !passInput) {
        console.error('[DEBUG] Login inputs not found!');
        return;
    }
    
    const u = userInput.value.trim().toLowerCase();
    const p = passInput.value.trim();
    
    console.log('[DEBUG] Username entered:', u);
    console.log('[DEBUG] Password length:', p.length);
    
    const user = DEMO_USERS[u];
    console.log('[DEBUG] User found:', user);

    if (user && user.password === p) {
        console.log('[DEBUG] Login successful');
        AppState.currentUser = { name: user.name, username: u, role: user.role };
        Storage.save('currentUser', AppState.currentUser);
        showToast('Welcome back, ' + escapeHTML(user.name) + '!', 'success');
        renderApp();
    } else {
        console.log('[DEBUG] Login failed - user:', user, 'password match:', user ? user.password === p : 'N/A');
        const errorDiv = document.getElementById('loginError');
        if (errorDiv) errorDiv.innerText = 'Invalid credentials';
        showToast('Invalid credentials', 'error');
    }
}

function handleLogout() {
    Storage.remove('currentUser');
    AppState.currentUser = null;
    Object.keys(AppState.charts).forEach(function(key) {
        if (AppState.charts[key]) {
            AppState.charts[key].destroy();
            AppState.charts[key] = null;
        }
    });
    renderLogin();
    showToast('Logged out successfully', 'info');
}

// APP SHELL
function renderApp() {
    console.log('[DEBUG] renderApp()');
    const appRoot = document.getElementById('appRoot');
    if (!appRoot) { console.error('[DEBUG] appRoot not found in renderApp!'); return; }
    
    appRoot.innerHTML =
        '<aside class="sidebar">' +
            '<div class="logo-area">' +
                '<div class="logo-img"><i class="fas fa-leaf"></i></div>' +
                '<div>' +
                    '<strong style="font-size:1.1rem;">' + escapeHTML(CONFIG.APP_NAME) + '</strong><br>' +
                    '<span style="font-size:0.7rem;opacity:0.7;">ERP + Reports</span>' +
                '</div>' +
            '</div>' +
            '<nav>' +
                '<div class="nav-item" data-page="dashboard"><i class="fas fa-chart-line"></i> Dashboard</div>' +
                '<div class="nav-item" data-page="tasks"><i class="fas fa-list-check"></i> Tasks</div>' +
                '<div class="nav-item" data-page="leads"><i class="fas fa-address-book"></i> CRM Leads</div>' +
                '<div class="nav-item" data-page="pipeline"><i class="fas fa-filter"></i> Pipeline</div>' +
                '<div class="nav-item" data-page="goals"><i class="fas fa-bullseye"></i> Goals</div>' +
                '<div class="nav-item" data-page="calendar"><i class="fas fa-calendar"></i> Calendar</div>' +
                '<div class="nav-item" data-page="reports"><i class="fas fa-print"></i> Reports</div>' +
                '<div style="margin-top:1rem;padding:0 1.5rem;font-size:0.7rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.1em;">Settings</div>' +
                '<div class="nav-item" onclick="toggleTheme()"><i class="fas fa-moon"></i> Dark Mode</div>' +
                '<div class="nav-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div>' +
            '</nav>' +
        '</aside>' +
        '<main class="main-content">' +
            '<div class="top-bar">' +
                '<div style="display:flex;align-items:center;gap:1rem;">' +
                    '<h2 id="pageTitle" style="font-size:1.25rem;font-weight:700;">Dashboard</h2>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:1rem;">' +
                    '<span class="badge badge-info"><i class="fas fa-user"></i> ' + escapeHTML(AppState.currentUser.name) + '</span>' +
                    '<span class="badge" style="background:var(--primary-light);color:var(--primary);">' + escapeHTML(ROLES[AppState.currentUser.role].label || AppState.currentUser.role) + '</span>' +
                '</div>' +
            '</div>' +
            '<div class="content-pane fade-in" id="pageContainer"></div>' +
        '</main>';

    document.querySelectorAll('.nav-item[data-page]').forEach(function(el) {
        el.addEventListener('click', function() {
            showPage(el.getAttribute('data-page'));
        });
    });

    showPage('dashboard');
}

async function showPage(page) {
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    const activeNav = document.querySelector('.nav-item[data-page="' + page + '"]');
    if (activeNav) activeNav.classList.add('active');
    document.getElementById('pageTitle').innerText = page.charAt(0).toUpperCase() + page.slice(1);

    Object.keys(AppState.charts).forEach(function(key) {
        if (AppState.charts[key]) {
            AppState.charts[key].destroy();
            AppState.charts[key] = null;
        }
    });

    switch (page) {
        case 'dashboard': await renderDashboard(); break;
        case 'tasks': await renderTasks(); break;
        case 'leads': await renderLeads(); break;
        case 'pipeline': await renderPipeline(); break;
        case 'goals': await renderGoals(); break;
        case 'calendar': await renderCalendar(); break;
        case 'reports': await renderReports(); break;
        default:
            document.getElementById('pageContainer').innerHTML =
                '<div class="card"><div class="card-body" style="text-align:center;padding:3rem;">' +
                '<i class="fas fa-tools" style="font-size:3rem;color:var(--text-secondary);margin-bottom:1rem;"></i>' +
                '<h3>Module Coming Soon</h3><p style="color:var(--text-secondary);">This feature is under development.</p>' +
                '</div></div>';
    }
}

// MODAL
function openModal(title, bodyHTML) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalBody').innerHTML = bodyHTML;
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('modalBody').innerHTML = '';
    document.body.style.overflow = '';
}

// DASHBOARD
async function renderDashboard() {
    const tasks = AppState.tasks;
    const overdue = tasks.filter(function(t) { return t.daysOverdue > 0; }).length;
    const leads = AppState.leads.filter(function(l) { return !l.archived; });
    const pipelineValue = leads.reduce(function(s, l) { return s + (l.value || 0); }, 0);
    const goals = AppState.goals;
    const activeGoals = goals.filter(function(g) { return new Date(g.endDate) >= new Date(); }).length;
    const completedTasks = tasks.filter(function(t) { return t.status === CONFIG.OUTSPOKEN; }).length;

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;margin-bottom:2rem;">';
    html += '<div class="stat-card"><div class="stat-icon"><i class="fas fa-tasks"></i></div><div class="stat-value">' + tasks.length + '</div><div class="stat-label">Total Tasks</div></div>';
    html += '<div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle" style="color:var(--success)"></i></div><div class="stat-value" style="color:var(--success)">' + completedTasks + '</div><div class="stat-label">' + CONFIG.OUTSPOKEN + '</div></div>';
    html += '<div class="stat-card"><div class="stat-icon"><i class="fas fa-clock" style="color:var(--danger)"></i></div><div class="stat-value" style="color:var(--danger)">' + overdue + '</div><div class="stat-label">Overdue</div></div>';
    html += '<div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line" style="color:var(--warning)"></i></div><div class="stat-value" style="color:var(--warning)">KES ' + pipelineValue.toLocaleString() + '</div><div class="stat-label">Pipeline Value</div></div>';
    html += '<div class="stat-card"><div class="stat-icon"><i class="fas fa-bullseye" style="color:var(--info)"></i></div><div class="stat-value" style="color:var(--info)">' + activeGoals + '</div><div class="stat-label">Active Goals</div></div>';
    html += '</div>';

    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:1.5rem;">';
    html += '<div class="card"><div class="card-header"><i class="fas fa-chart-pie"></i> Task Status Distribution</div><div class="card-body"><canvas id="statusChartDash"></canvas></div></div>';
    html += '<div class="card"><div class="card-header"><i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i> Top Overdue Tasks</div><div class="card-body"><table class="data-table"><thead><tr><th>Task</th><th>Owner</th><th>Days Overdue</th></tr></thead><tbody>';

    const overdueTasks = tasks.filter(function(t) { return t.daysOverdue > 0; }).slice(0, 5);
    if (overdueTasks.length > 0) {
        overdueTasks.forEach(function(t) {
            html += '<tr><td>' + escapeHTML(t.name) + '</td><td>' + escapeHTML(t.owner) + '</td><td><span class="badge badge-danger">' + t.daysOverdue + '</span></td></tr>';
        });
    } else {
        html += '<tr><td colspan="3" style="text-align:center;color:var(--text-secondary);">No overdue tasks</td></tr>';
    }
    html += '</tbody></table></div></div></div>';

    html += '<div class="card" style="margin-top:1.5rem;"><div class="card-header"><i class="fas fa-bolt"></i> Recent Activity</div><div class="card-body"><table class="data-table"><thead><tr><th>Task</th><th>Status</th><th>Due Date</th><th>Progress</th></tr></thead><tbody>';
    tasks.slice(0, 5).forEach(function(t) {
        const badgeClass = t.status === CONFIG.OUTSPOKEN ? 'badge-success' : (t.status === 'In Progress' ? 'badge-info' : 'badge-warning');
        html += '<tr><td>' + escapeHTML(t.name) + '</td><td><span class="badge ' + badgeClass + '">' + escapeHTML(t.status) + '</span></td><td>' + escapeHTML(t.dueDate || '-') + '</td><td><div class="progress-bar" style="width:120px;"><div class="progress-fill" style="width:' + Math.min(100, t.percentComplete) + '%;"></div></div><small>' + t.percentComplete + '%</small></td></tr>';
    });
    html += '</tbody></table></div></div>';

    document.getElementById('pageContainer').innerHTML = html;

    const statusCount = { 'In Progress': 0, [CONFIG.OUTSPOKEN]: 0, 'Not Started': 0 };
    tasks.forEach(function(t) {
        if (statusCount[t.status] !== undefined) statusCount[t.status]++;
    });

    if (AppState.charts.statusChartDash) {
        AppState.charts.statusChartDash.destroy();
        AppState.charts.statusChartDash = null;
    }

    const ctx = document.getElementById('statusChartDash');
    if (ctx) {
        AppState.charts.statusChartDash = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(statusCount),
                datasets: [{
                    data: Object.values(statusCount),
                    backgroundColor: ['#3b82f6', '#10b981', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }
}

// TASKS
async function renderTasks() {
    const tasks = AppState.tasks;
    const filterStatus = document.getElementById('taskFilterStatus')?.value || 'All';
    const filterPriority = document.getElementById('taskFilterPriority')?.value || 'All';
    const searchTerm = document.getElementById('taskSearch')?.value?.toLowerCase() || '';

    let filtered = tasks;
    if (filterStatus !== 'All') filtered = filtered.filter(function(t) { return t.status === filterStatus; });
    if (filterPriority !== 'All') filtered = filtered.filter(function(t) { return t.priority === filterPriority; });
    if (searchTerm) filtered = filtered.filter(function(t) { return t.name.toLowerCase().includes(searchTerm) || t.owner.toLowerCase().includes(searchTerm); });

    let html = '<div class="section-header"><h3><i class="fas fa-list-check"></i> All Tasks</h3><button class="btn btn-primary" onclick="openTaskModal()"><i class="fas fa-plus"></i> New Task</button></div>';
    html += '<div class="filter-bar">';
    html += '<input type="text" id="taskSearch" placeholder="Search tasks..." value="' + escapeHTML(searchTerm) + '" oninput="renderTasks()">';
    html += '<select id="taskFilterStatus" onchange="renderTasks()"><option value="All">All Status</option><option value="Not Started">Not Started</option><option value="In Progress">In Progress</option><option value="' + CONFIG.OUTSPOKEN + '">' + CONFIG.OUTSPOKEN + '</option></select>';
    html += '<select id="taskFilterPriority" onchange="renderTasks()"><option value="All">All Priority</option><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option></select>';
    html += '</div>';
    html += '<div class="card"><div class="card-body"><table class="data-table"><thead><tr><th>Title</th><th>Project</th><th>Owner</th><th>Priority</th><th>Status</th><th>Due Date</th><th>Progress</th><th>Actions</th></tr></thead><tbody>';

    if (filtered.length > 0) {
        filtered.forEach(function(t) {
            const priorityBadge = t.priority === 'High' ? 'badge-danger' : (t.priority === 'Medium' ? 'badge-warning' : 'badge-info');
            const statusBadge = t.status === CONFIG.OUTSPOKEN ? 'badge-success' : (t.status === 'In Progress' ? 'badge-info' : 'badge-warning');
            html += '<tr>';
            html += '<td><strong>' + escapeHTML(t.name) + '</strong></td>';
            html += '<td>' + escapeHTML(t.project || '-') + '</td>';
            html += '<td>' + escapeHTML(t.owner) + '</td>';
            html += '<td><span class="badge ' + priorityBadge + '">' + escapeHTML(t.priority) + '</span></td>';
            html += '<td><span class="badge ' + statusBadge + '">' + escapeHTML(t.status) + '</span></td>';
            html += '<td>' + escapeHTML(t.dueDate || '-') + '</td>';
            html += '<td><div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:' + Math.min(100, t.percentComplete) + '%;"></div></div><small>' + t.percentComplete + '%</small></td>';
            html += '<td><button class="btn btn-outline btn-sm" onclick="openTaskModal(\'' + escapeHTML(t.id) + '\')"><i class="fas fa-edit"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteTaskItem(\'' + escapeHTML(t.id) + '\')"><i class="fas fa-trash"></i></button></td>';
            html += '</tr>';
        });
    } else {
        html += '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-secondary);">No tasks found</td></tr>';
    }
    html += '</tbody></table></div></div>';

    document.getElementById('pageContainer').innerHTML = html;
}

function openTaskModal(id) {
    const task = id ? AppState.tasks.find(function(t) { return t.id === id; }) : null;
    const isEdit = !!task;

    let bodyHTML = '<input type="hidden" id="taskIdVal" value="' + escapeHTML(task?.id || '') + '">';
    bodyHTML += '<div class="form-row"><div class="form-group"><label>Task Name</label><input id="taskName" value="' + escapeHTML(task?.name || '') + '" placeholder="Enter task name"></div>';
    bodyHTML += '<div class="form-group"><label>Project</label><input id="taskProject" value="' + escapeHTML(task?.project || '') + '" placeholder="Project name"></div></div>';
    bodyHTML += '<div class="form-row"><div class="form-group"><label>Owner</label><input id="taskOwner" value="' + escapeHTML(task?.owner || '') + '" placeholder="Assigned to"></div>';
    bodyHTML += '<div class="form-group"><label>Priority</label><select id="taskPriority"><option ' + (task?.priority === 'Low' ? 'selected' : '') + '>Low</option><option ' + (task?.priority === 'Medium' ? 'selected' : '') + '>Medium</option><option ' + (task?.priority === 'High' ? 'selected' : '') + '>High</option></select></div></div>';
    bodyHTML += '<div class="form-row"><div class="form-group"><label>Status</label><select id="taskStatus"><option ' + (task?.status === 'Not Started' ? 'selected' : '') + '>Not Started</option><option ' + (task?.status === 'In Progress' ? 'selected' : '') + '>In Progress</option><option ' + (task?.status === CONFIG.OUTSPOKEN ? 'selected' : '') + '>' + CONFIG.OUTSPOKEN + '</option></select></div>';
    bodyHTML += '<div class="form-group"><label>Due Date</label><input type="date" id="taskDue" value="' + escapeHTML(task?.dueDate || '') + '"></div></div>';
    bodyHTML += '<div class="form-group"><label>Progress (%)</label><input type="number" id="taskProgress" min="0" max="100" value="' + (task?.percentComplete || 0) + '"></div>';

function logGoal(id) {
    const inc = prompt('How much progress to add?');
    if (inc && !isNaN(parseInt(inc))) {
        const goal = AppState.goals.find(function(g) { return g.id === id; });
        if (goal) {
            goal.current = Math.min(goal.target, goal.current + parseInt(inc));
            goal.logs.push({ date: new Date().toISOString().split('T')[0], amount: parseInt(inc) });
            saveAll();
            showToast('Progress logged: +' + inc + ' ' + goal.unit, 'success');
            renderGoals();
        }
    }
}

// CALENDAR
async function renderCalendar() {
    const tasks = AppState.tasks;
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    const monthName = today.toLocaleString('default', { month: 'long' });
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();

    let html = '<div class="section-header"><h3><i class="fas fa-calendar"></i> ' + monthName + ' ' + year + '</h3></div>';
    html += '<div class="card"><div class="card-body">';
    html += '<div class="calendar-grid">';

    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    dayNames.forEach(function(d) {
        html += '<div class="calendar-day-header">' + d + '</div>';
    });

    for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day" style="background:transparent;border:none;"></div>';
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        const dayTasks = tasks.filter(function(t) { return t.dueDate === dateStr; });
        const hasTask = dayTasks.length > 0;
        html += '<div class="calendar-day ' + (hasTask ? 'has-task' : '') + '">';
        html += '<div style="font-weight:700;margin-bottom:0.25rem;">' + day + '</div>';
        dayTasks.forEach(function(t) {
            const statusColor = t.status === CONFIG.OUTSPOKEN ? 'var(--success)' : (t.status === 'In Progress' ? 'var(--primary)' : 'var(--warning)');
            html += '<div style="font-size:0.7rem;padding:0.15rem 0.3rem;background:' + statusColor + '20;color:' + statusColor + ';border-radius:0.25rem;margin-bottom:0.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;" onclick="openTaskModal(\'' + escapeHTML(t.id) + '\')">' + escapeHTML(t.name) + '</div>';
        });
        html += '</div>';
    }

    html += '</div></div></div>';

    html += '<div class="card" style="margin-top:1.5rem;"><div class="card-header"><i class="fas fa-list"></i> Upcoming Deadlines</div><div class="card-body"><table class="data-table"><thead><tr><th>Task</th><th>Due Date</th><th>Status</th><th>Owner</th></tr></thead><tbody>';
    const upcoming = tasks.filter(function(t) { return t.dueDate; }).sort(function(a, b) { return new Date(a.dueDate) - new Date(b.dueDate); }).slice(0, 10);
    if (upcoming.length > 0) {
        upcoming.forEach(function(t) {
            const statusBadge = t.status === CONFIG.OUTSPOKEN ? 'badge-success' : (t.status === 'In Progress' ? 'badge-info' : 'badge-warning');
            html += '<tr><td><strong>' + escapeHTML(t.name) + '</strong></td><td>' + escapeHTML(t.dueDate) + '</td><td><span class="badge ' + statusBadge + '">' + escapeHTML(t.status) + '</span></td><td>' + escapeHTML(t.owner) + '</td></tr>';
        });
    } else {
        html += '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);">No upcoming deadlines</td></tr>';
    }
    html += '</tbody></table></div></div>';

    document.getElementById('pageContainer').innerHTML = html;
}

// REPORTS
async function renderReports() {
    const tasks = AppState.tasks;

    const wonLeads = leads.filter(function(l) { return l.stage === 'Won'; }).length;

    const goalAvg = goals.length > 0 ? (goals.reduce(function(s, g) { return s + (g.target > 0 ? (g.current / g.target * 100) : 0); }, 0) / goals.length).toFixed(0) : 0;

    html += '<div class="card"><div class="card-header"><i class="fas fa-list-check"></i> Task Summary</div><div class="card-body"><table class="data-table"><thead><tr><th>Status</th><th>Count</th><th>Percentage</th></tr></thead><tbody>';

    tasks.forEach(function(t) { statusSummary[t.status] = (statusSummary[t.status] || 0) + 1; });
    Object.entries(statusSummary).forEach(function(_ref) { var status = _ref[0], count = _ref[1]; html += '<tr><td>' + escapeHTML(status) + '</td><td>' + count + '</td><td>' + (totalTasks > 0 ? ((count / totalTasks) * 100).toFixed(1) : 0) + '%</td></tr>'; });
    html += '</tbody></table></div></div>';

    goals.forEach(function(g) {

    });
    html += '</tbody></table></div></div>';

    html += '<div class="card"><div class="card-header"><i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i> Overdue Tasks</div><div class="card-body"><table class="data-table"><thead><tr><th>Task</th><th>Owner</th><th>Due Date</th><th>Days Overdue</th></tr></thead><tbody>';
    if (overdueTasks.length > 0) {
        overdueTasks.forEach(function(t) {
            html += '<tr><td>' + escapeHTML(t.name) + '</td><td>' + escapeHTML(t.owner) + '</td><td>' + escapeHTML(t.dueDate || '-') + '</td><td><span class="badge badge-danger">' + t.daysOverdue + '</span></td></tr>';
        });
    } else {
        html += '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);">No overdue tasks - great job!</td></tr>';
    }
    html += '</tbody></table></div></div>';

    html += '</div>';

    html += '<div class="card" style="margin-top:1.5rem;"><div class="card-header"><i class="fas fa-info-circle"></i> Report Metadata</div><div class="card-body"><p><i class="fas fa-calendar-alt"></i> Generated: ' + new Date().toLocaleString() + '</p><p><i class="fas fa-desktop"></i> System: ' + escapeHTML(CONFIG.APP_NAME) + ' v' + CONFIG.VERSION + '</p><p><i class="fas fa-user"></i> Generated by: ' + escapeHTML(AppState.currentUser.name) + ' (' + escapeHTML(AppState.currentUser.role) + ')</p><p style="color:var(--text-secondary);font-size:0.875rem;">All data reflects current local storage state. For audit purposes, export regularly.</p></div></div>';

    document.getElementById('pageContainer').innerHTML = html;
}
